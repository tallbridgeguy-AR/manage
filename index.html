<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      
      /* Scanning Message Overlay */
      #scanning-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.8);
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        color: white; font-family: sans-serif; z-index: 99; text-align: center;
        padding: 20px;
      }
      #scanning-overlay.hidden { display: none !important; }

      /* Control Buttons */
      #ui-container {
        position: fixed; bottom: 20px; left: 50%;
        transform: translateX(-50%); z-index: 100;
        display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 95%;
      }
      .btn {
        background: rgba(0, 0, 0, 0.75); color: white; border: 2px solid #fff;
        padding: 12px 20px; border-radius: 30px; font-family: sans-serif;
        font-weight: bold; cursor: pointer; font-size: 14px;
        transition: 0.2s;
        -webkit-tap-highlight-color: transparent;
      }
      .btn:active { background: white; color: black; }
    </style>

    <script>
      // --- EASY SWAP CONFIGURATION ---
      // Ensure the order here matches the order of images in your .mind file
      const TARGETS = [
        { name: "Trex",    modelSrc: "roar4.glb",   scale: "1 1 1",   pos: "0 0.1 0" },
        { name: "TRactor", modelSrc: "johndeere.glb", scale: "0.5 0.5 0.5", pos: "0 0.2 0" },
        { name: "Toaster", modelSrc: "toaster3.glb", scale: "1.5 1.5 1.5", pos: "0 0 0" }
      ];

      // Drag to Rotate Component
      AFRAME.registerComponent('drag-rotate', {
        schema: { speed: {default: 2} },
        init: function() {
          this.ifMouseDown = false; this.x_cord = 0;
          const handleStart = (x) => { this.ifMouseDown = true; this.x_cord = x; };
          const handleEnd = () => { this.ifMouseDown = false; };
          const handleMove = (x) => {
            if(this.ifMouseDown) {
              let temp_x = x - this.x_cord;
              this.el.object3D.rotateY(temp_x * (this.data.speed / 1000));
              this.x_cord = x;
            }
          };
          document.addEventListener('mousedown', (e) => handleStart(e.clientX));
          document.addEventListener('touchstart', (e) => handleStart(e.touches[0].clientX));
          document.addEventListener('mouseup', handleEnd);
          document.addEventListener('touchend', handleEnd);
          document.addEventListener('mousemove', (e) => handleMove(e.clientX));
          document.addEventListener('touchmove', (e) => handleMove(e.touches[0].clientX));
        }
      });
    </script>
  </head>
  <body>

    <div id="scanning-overlay">
      <p id="scanning-text">Preparing AR Camera...</p>
    </div>

    <div id="ui-container">
      <button class="btn" id="zOut">Zoom -</button>
      <button class="btn" id="toggleMode">Switch Vertical</button>
      <button class="btn" id="zIn">Zoom +</button>
    </div>

    <a-scene id="ar-scene"
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: #scanning-overlay; filterMinCF: 0.0001; filterBeta: 0.001;"
      device-orientation-permission-ui="enabled: false"
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights: true" 
      vr-mode-ui="enabled: false">
      
      <a-assets id="asset-container"></a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      
      <a-entity light="type: hemisphere; intensity: 2.0"></a-entity>
      <a-entity light="type: directional; intensity: 1.5" position="-1 2 1"></a-entity>
    </a-scene>

    <script>
      const sceneEl = document.querySelector('a-scene');
      const assetContainer = document.querySelector('#asset-container');
      const overlay = document.querySelector('#scanning-overlay');
      const scanText = document.querySelector('#scanning-text');
      let isVertical = false;

      sceneEl.addEventListener('loaded', () => {
        TARGETS.forEach((config, index) => {
          // 1. Create Asset Reference
          const asset = document.createElement('a-asset-item');
          asset.setAttribute('id', `model-${index}`);
          asset.setAttribute('src', config.modelSrc);
          assetContainer.appendChild(asset);

          // 2. Create AR Target Entity
          const target = document.createElement('a-entity');
          target.setAttribute('mindar-image-target', `targetIndex: ${index}`);

          // 3. Create Model Entity
          const model = document.createElement('a-gltf-model');
          model.setAttribute('src', `#model-${index}`);
          model.setAttribute('rotation', '90 0 0');
          model.setAttribute('position', config.pos);
          model.setAttribute('scale', config.scale);
          model.setAttribute('drag-rotate', '');
          model.setAttribute('animation-mixer', '');
          
          target.appendChild(model);
          sceneEl.appendChild(target);

          // Visibility Toggles
          target.addEventListener("targetFound", () => { overlay.classList.add("hidden"); });
          target.addEventListener("targetLost", () => { overlay.classList.remove("hidden"); });
        });

        const namesList = TARGETS.map(t => t.name).join(", ");
        scanText.innerText = "Point camera at:\n" + namesList;
      });

      // Zoom functionality
      document.querySelector('#zIn').addEventListener('click', () => adjustZoom(0.15));
      document.querySelector('#zOut').addEventListener('click', () => adjustZoom(-0.15));
      
      function adjustZoom(amount) {
        document.querySelectorAll('a-gltf-model').forEach(model => {
          let s = model.getAttribute('scale');
          model.setAttribute('scale', `${s.x + amount} ${s.y + amount} ${s.z + amount}`);
        });
      }

      // Vertical/Flat Rotation Toggle
      document.querySelector('#toggleMode').addEventListener('click', function() {
        isVertical = !isVertical;
        this.innerText = isVertical ? "Switch Flat" : "Switch Vertical";
        document.querySelectorAll('a-gltf-model').forEach(model => {
          model.setAttribute('rotation', isVertical ? '0 0 0' : '90 0 0');
        });
      });
    </script>
  </body>
</html>
